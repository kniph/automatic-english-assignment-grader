<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">
  <title>Vocabulary Exam</title>
  <link rel="stylesheet" href="css/vocab.css">
</head>
<body>
  <header class="vocab-header">
    <h1 id="diagnosticsTrigger">單字考試</h1>
    <nav>
      <a href="vocab-teacher.html">教師 Builder</a>
      <a href="index.html">主系統首頁</a>
    </nav>
  </header>

  <main class="vocab-shell">
    <section id="selectionSection">
      <div class="vocab-summary-bar" id="selectionSummaryBar">請輸入姓名開始</div>

      <div class="vocab-step-card" id="stepNameCard">
        <div class="vocab-step-label">Step 1</div>
        <div class="vocab-step-title">你的名字是？</div>
        <div class="vocab-field">
          <input id="studentNameInput" class="vocab-name-input" type="text" maxlength="100" placeholder="請輸入姓名">
        </div>
        <div class="vocab-note" style="margin-top: 0.9rem;">
          選擇一份已發布考卷後即可在 iPad 上直接作答。每題嚴格比對大小寫與拼字。
        </div>
      </div>

      <div class="vocab-step-card vocab-hidden" id="stepHowdyCard">
        <div class="vocab-step-label">Step 2</div>
        <div class="vocab-step-title">選擇 Howdy 幾冊？</div>
        <div class="vocab-select-grid cols-5" id="howdySelectionGrid"></div>
      </div>

      <div class="vocab-step-card vocab-hidden" id="stepUnitCard">
        <div class="vocab-step-label">Step 3</div>
        <div class="vocab-step-title">選擇 Unit 幾？</div>
        <div class="vocab-select-grid cols-4" id="unitSelectionGrid"></div>
      </div>

      <div class="vocab-step-card vocab-hidden" id="stepExamCard">
        <div class="vocab-step-label">Step 4</div>
        <div class="vocab-step-title">選擇考卷</div>
        <div class="vocab-selection-list" id="examSelectionList"></div>
      </div>

      <div class="vocab-step-card vocab-hidden" id="customExamCard">
        <div class="vocab-step-label">其他</div>
        <div class="vocab-step-title">自訂考卷</div>
        <div class="vocab-selection-list" id="customExamSelectionList"></div>
      </div>
    </section>

    <section id="workspaceSection" class="vocab-hidden vocab-no-select">
      <div class="vocab-card">
        <div class="vocab-actions" style="justify-content: space-between;">
          <div>
            <h2 id="workspaceTitle" style="margin: 0 0 0.3rem;">考卷載入中…</h2>
            <div class="vocab-meta-row" id="workspaceMeta"></div>
          </div>
          <button class="vocab-btn secondary" id="backToSelectionBtn" type="button">返回選考</button>
        </div>
      </div>

      <div class="vocab-card">
        <div class="vocab-toolbar">
          <button class="vocab-tool active" type="button" data-tool="pen">筆</button>
          <button class="vocab-tool" type="button" data-tool="eraser">橡皮擦</button>
          <span class="vocab-color black active" data-color="#111111"></span>
          <span class="vocab-color blue" data-color="#1f7ae0"></span>
          <span class="vocab-color red" data-color="#d84d4d"></span>
          <span class="vocab-color green" data-color="#1c8a5b"></span>
          <button class="vocab-tool active" type="button" data-size="3">S</button>
          <button class="vocab-tool" type="button" data-size="5">M</button>
          <button class="vocab-tool" type="button" data-size="7">L</button>
          <div class="vocab-zoom-group" aria-label="縮放控制">
            <button class="vocab-btn secondary" id="zoomOutBtn" type="button">縮小</button>
            <button class="vocab-btn secondary" id="zoomFitBtn" type="button">適合寬度</button>
            <button class="vocab-btn secondary" id="zoomInBtn" type="button">放大</button>
            <span class="vocab-zoom-label" id="zoomLabel">100%</span>
          </div>
          <button class="vocab-btn secondary" id="undoBtn" type="button">復原</button>
          <button class="vocab-btn danger" id="clearBtn" type="button">清空</button>
          <button class="vocab-btn primary" id="submitBtn" type="button">送出批改</button>
        </div>
        <div class="vocab-guide-note">
          請把每題答案寫在藍色虛線框內，盡量從框的左側開始寫。
        </div>
      </div>

      <div class="vocab-surface-stack" id="pageSurfaceStack"></div>
    </section>
  </main>

  <div class="vocab-diagnostics vocab-hidden" id="diagnosticsPanel" aria-hidden="true">
    <div class="vocab-diagnostics-backdrop" data-close-diagnostics></div>
    <div class="vocab-diagnostics-sheet" role="dialog" aria-modal="true" aria-labelledby="diagnosticsTitle">
      <div class="vocab-diagnostics-head">
        <div>
          <div class="vocab-step-label">Support</div>
          <h2 id="diagnosticsTitle">系統資訊</h2>
        </div>
        <button class="vocab-btn secondary" id="closeDiagnosticsBtn" type="button">關閉</button>
      </div>

      <div class="vocab-diagnostics-code-wrap">
        <div class="vocab-diagnostics-kicker">支援碼</div>
        <div class="vocab-diagnostics-code" id="diagnosticsSupportCode">載入中…</div>
      </div>

      <div class="vocab-diagnostics-grid">
        <div class="vocab-diagnostics-item">
          <span>更新時間</span>
          <strong id="diagnosticsStartedAt">載入中…</strong>
        </div>
        <div class="vocab-diagnostics-item">
          <span>頁面版本</span>
          <strong id="diagnosticsAppVersion">載入中…</strong>
        </div>
        <div class="vocab-diagnostics-item">
          <span>目前考卷</span>
          <strong id="diagnosticsExam">尚未開啟</strong>
        </div>
        <div class="vocab-diagnostics-item">
          <span>教師狀態</span>
          <strong id="diagnosticsTeacherState">載入中…</strong>
        </div>
      </div>

      <details class="vocab-diagnostics-details">
        <summary>技術資訊</summary>
        <pre class="vocab-diagnostics-tech" id="diagnosticsTechInfo">載入中…</pre>
      </details>

      <div class="vocab-actions" style="margin-top: 1rem;">
        <button class="vocab-btn primary" id="copyDiagnosticsBtn" type="button">複製支援資訊</button>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/vocab-drawing.js"></script>
  <script src="js/vocab-exam.js"></script>
</body>
</html>
