<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vocabulary Review</title>
  <link rel="stylesheet" href="css/vocab.css">
</head>
<body class="vocab-student-page vocab-review-page">
  <header class="vocab-header">
    <h1>錯題複習</h1>
    <nav>
      <a href="vocab-exam.html">考卷列表</a>
      <a href="index.html">主系統首頁</a>
    </nav>
  </header>

  <main class="vocab-shell">
    <section class="vocab-app-hero">
      <h1 class="vocab-app-title">📚 Vocabulary Review</h1>
      <div class="vocab-app-subtitle">先看題目與答案練習一次，再進入錯題再考</div>
    </section>

    <div class="vocab-card">
      <div class="vocab-actions" style="justify-content: space-between;">
        <div>
          <h2 id="reviewTitle" style="margin: 0 0 0.3rem;">錯題複習</h2>
          <div class="vocab-meta-row" id="reviewMeta"></div>
        </div>
        <a class="vocab-btn secondary" id="backToReviewResultLink" href="#">回上一份結果</a>
      </div>
    </div>

    <div class="vocab-card">
      <div class="vocab-toolbar">
        <button class="vocab-tool active" type="button" data-tool="pen">筆</button>
        <button class="vocab-tool" type="button" data-tool="eraser">橡皮擦</button>
        <span class="vocab-color black active" data-color="#111111"></span>
        <span class="vocab-color blue" data-color="#1f7ae0"></span>
        <span class="vocab-color red" data-color="#d84d4d"></span>
        <span class="vocab-color green" data-color="#1c8a5b"></span>
        <button class="vocab-tool active" type="button" data-size="3">S</button>
        <button class="vocab-tool" type="button" data-size="5">M</button>
        <button class="vocab-tool" type="button" data-size="7">L</button>
        <button class="vocab-btn secondary" id="undoReviewBtn" type="button">復原</button>
        <button class="vocab-btn danger" id="clearReviewBtn" type="button">清空</button>
        <button class="vocab-btn primary" id="startRetestBtn" type="button">完成複習，開始錯題再考</button>
      </div>
      <div class="vocab-note" style="margin-top: 0.9rem;">
        這一輪不計分。請先看著正確答案寫一次，寫完再進入錯題再考。
      </div>
    </div>

    <div class="vocab-question-cards" id="reviewQuestionCards"></div>
    <div class="vocab-card" id="reviewStatusCard">
      <div class="vocab-empty" id="reviewStatusText">正在準備錯題複習內容…</div>
    </div>
  </main>

  <script src="js/common.js"></script>
  <script src="js/vocab-drawing.js"></script>
  <script src="js/vocab-review.js"></script>
</body>
</html>
