<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>作業習作</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #1a1a2e;
      display: flex; flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      flex-shrink: 0;
      background: #1a73e8;
      color: white;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.75rem;
      height: 52px;
      z-index: 20;
    }
    .topbar .info { font-size: 0.88rem; font-weight: 600; }
    .topbar .info .small { font-size: 0.73rem; font-weight: 400; opacity: 0.8; }
    .topbar .back-btn {
      background: rgba(255,255,255,0.15); border: none; color: white;
      padding: 0.35rem 0.75rem; border-radius: 8px; font-size: 0.85rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }

    /* ── Audio bar ── */
    .audio-bar {
      flex-shrink: 0;
      background: #0d47a1;
      padding: 0.4rem 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
      flex-wrap: nowrap; overflow-x: auto;
      z-index: 20;
    }
    .audio-bar.hidden { display: none; }
    .audio-label { color: rgba(255,255,255,0.7); font-size: 0.75rem; flex-shrink: 0; }
    /* Each track: button + progress stay on one row */
    .audio-track {
      display: flex; align-items: center; gap: 0.3rem; flex-shrink: 0;
    }
    .audio-play-btn {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 0.3rem 0.8rem; border-radius: 20px;
      font-size: 0.82rem; cursor: pointer; display: flex; align-items: center; gap: 0.3rem;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent; transition: background 0.15s;
    }
    .audio-play-btn:active, .audio-play-btn.playing { background: rgba(255,255,255,0.3); }
    .audio-progress { color: rgba(255,255,255,0.75); font-size: 0.73rem; min-width: 2.8rem; white-space: nowrap; }
    .risk-banner {
      flex-shrink: 0;
      background: #fff4e5;
      color: #8a4b00;
      border-bottom: 1px solid #ffd199;
      padding: 0.55rem 0.75rem;
      font-size: 0.82rem;
      line-height: 1.45;
    }
    .risk-banner.hidden { display: none; }
    .risk-banner strong { display: block; margin-bottom: 0.15rem; }

    /* ── Toolbar ── */
    .toolbar {
      flex-shrink: 0;
      background: #23234a;
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      z-index: 20;
      overflow-x: auto;
    }
    .tool-btn {
      background: rgba(255,255,255,0.1); border: 2px solid transparent;
      color: white; padding: 0.35rem 0.7rem; border-radius: 8px;
      font-size: 0.82rem; cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent; transition: all 0.15s;
    }
    .tool-btn.active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.5); }
    .tool-btn:active { transform: scale(0.93); }
    .color-dot {
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .color-dot.active { border-color: white; box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }
    .stroke-btn {
      background: rgba(255,255,255,0.1); border: 2px solid transparent;
      color: white; width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
      -webkit-tap-highlight-color: transparent;
    }
    .stroke-btn.active { border-color: white; background: rgba(255,255,255,0.25); }
    .tool-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.2); margin: 0 0.15rem; flex-shrink: 0; }

    /* ── Canvas area ── */
    .canvas-wrapper {
      flex: 1; overflow: auto;
      position: relative;
      background: #111;
      -webkit-overflow-scrolling: touch;
    }
    .canvas-container {
      position: relative;
      display: inline-block;
    }
    #bgCanvas {
      display: block;
      pointer-events: none;
    }
    #drawCanvas {
      position: absolute; top: 0; left: 0;
      touch-action: none; /* 完全由 JS 控制，避免 iPadOS 誤判 Pencil 為手指捲動 */
      cursor: crosshair;
    }

    /* ── Bottom bar ── */
    .bottombar {
      flex-shrink: 0;
      background: #23234a;
      padding: 0.6rem 0.75rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 0.5rem;
      z-index: 20;
    }
    .undo-btn {
      background: rgba(255,255,255,0.12); border: none; color: white;
      padding: 0.5rem 1rem; border-radius: 10px; font-size: 0.88rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .clear-btn {
      background: rgba(220,53,69,0.25); border: 1px solid rgba(220,53,69,0.4);
      color: #ff8a8a; padding: 0.5rem 1rem; border-radius: 10px; font-size: 0.88rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .submit-btn {
      background: #34a853; border: none; color: white;
      padding: 0.6rem 1.5rem; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 2px 10px rgba(52,168,83,0.4);
      flex: 1; max-width: 200px;
    }
    .submit-btn:active { transform: scale(0.97); background: #2d9144; }
    .submit-btn:disabled { background: #555; box-shadow: none; color: #aaa; }

    /* ── Loading overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(10,20,50,0.88);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; z-index: 200; gap: 1rem;
    }
    .overlay.hidden { display: none; }
    .overlay .title { font-size: 1.1rem; font-weight: 700; }
    .overlay .sub { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
    .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results overlay ── */
    .results-overlay {
      position: fixed; inset: 0;
      background: rgba(10,20,50,0.92);
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      overflow-y: auto; padding: 1.5rem 1rem 3rem;
      z-index: 300;
    }
    .results-overlay.hidden { display: none; }
    .result-card {
      background: white; border-radius: 20px;
      padding: 1.5rem; width: 100%; max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .score-display {
      text-align: center; margin-bottom: 1.25rem;
    }
    .score-big { font-size: 3rem; font-weight: 900; color: #1a73e8; }
    .score-label { font-size: 0.85rem; color: #888; margin-top: 0.2rem; }
    .score-pct { font-size: 1.4rem; font-weight: 700; margin-top: 0.3rem; }
    .result-warning {
      background: #fff4e5;
      color: #8a4b00;
      border: 1px solid #ffd199;
      border-radius: 12px;
      padding: 0.8rem 0.9rem;
      font-size: 0.86rem;
      line-height: 1.5;
      margin-bottom: 1rem;
    }
    .result-warning.hidden { display: none; }
    .answer-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.45rem 0; border-bottom: 1px solid #f0f0f0;
      font-size: 0.92rem;
    }
    .answer-row:last-child { border-bottom: none; }
    .q-num { font-weight: 700; color: #666; min-width: 2.8rem; font-size: 0.82rem; }
    .mark-ok  { color: #28a745; font-weight: 800; font-size: 1.1rem; }
    .mark-no  { color: #dc3545; font-weight: 800; font-size: 1.1rem; }
    .ans-text { flex: 1; font-family: monospace; }
    .ans-expected { color: #888; font-size: 0.82rem; }
    .result-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .result-btn {
      flex: 1; padding: 0.75rem; border: none; border-radius: 12px;
      font-size: 0.95rem; font-weight: 700; cursor: pointer;
    }
    .result-btn-back { background: #f0f4ff; color: #1a73e8; }
    .result-btn-redo { background: #1a73e8; color: white; }

    /* Error toast */
    .err-toast {
      position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%);
      background: #dc3545; color: white; padding: 0.65rem 1.25rem;
      border-radius: 10px; font-size: 0.88rem; z-index: 500;
      white-space: nowrap;
    }
    .err-toast.hidden { display: none; }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div class="overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="title" id="loadingTitle">載入習作中…</div>
    <div class="sub" id="loadingSub"></div>
  </div>

  <!-- Results overlay -->
  <div class="results-overlay hidden" id="resultsOverlay">
    <div class="result-card">
      <div class="score-display">
        <div class="score-big" id="scoreBig">—</div>
        <div class="score-label" id="scoreLabel">得分 / 總分</div>
        <div class="score-pct" id="scorePct"></div>
      </div>
      <div class="result-warning hidden" id="resultWarning"></div>
      <div id="answerList"></div>
      <div class="result-actions">
        <button class="result-btn result-btn-back" onclick="goBack()">← 返回首頁</button>
        <button class="result-btn result-btn-redo" onclick="redoAssignment()">重新作答</button>
      </div>
    </div>
  </div>

  <!-- Error toast -->
  <div class="err-toast hidden" id="errToast"></div>

  <!-- Top bar -->
  <div class="topbar">
    <button class="back-btn" onclick="if(confirm('確定離開？作答內容將不會儲存。'))goBack()">← 返回</button>
    <div class="info">
      <div id="topInfo">載入中…</div>
      <div class="small" id="topStudent"></div>
    </div>
    <div style="width:56px;"></div>
  </div>

  <div class="risk-banner hidden" id="riskBanner">
    <strong>這份作業的批改結果是暫定分數</strong>
    <span id="riskBannerText"></span>
  </div>

  <!-- Audio bar -->
  <div class="audio-bar hidden" id="audioBar">
    <span class="audio-label">🎧 聽力：</span>
    <div id="audioButtons" style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0;"></div>
  </div>

  <!-- Drawing toolbar -->
  <div class="toolbar">
    <button class="tool-btn active" id="btnPen" onclick="setTool('pen')">✏️ 筆</button>
    <button class="tool-btn" id="btnEraser" onclick="setTool('eraser')">⌫ 橡皮擦</button>
    <div class="tool-sep"></div>
    <div class="color-dot active" style="background:#111;" data-color="#111" onclick="setColor('#111')"></div>
    <div class="color-dot" style="background:#1a73e8;" data-color="#1a73e8" onclick="setColor('#1a73e8')"></div>
    <div class="color-dot" style="background:#dc3545;" data-color="#dc3545" onclick="setColor('#dc3545')"></div>
    <div class="color-dot" style="background:#28a745;" data-color="#28a745" onclick="setColor('#28a745')"></div>
    <div class="tool-sep"></div>
    <button class="stroke-btn active" data-size="2" onclick="setStrokeSize(2)">S</button>
    <button class="stroke-btn" data-size="4" onclick="setStrokeSize(4)">M</button>
    <button class="stroke-btn" data-size="7" onclick="setStrokeSize(7)">L</button>
  </div>

  <!-- Canvas area -->
  <div class="canvas-wrapper" id="canvasWrapper">
    <div class="canvas-container" id="canvasContainer">
      <canvas id="bgCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <button class="undo-btn" onclick="undo()">↩ 復原</button>
    <button class="clear-btn" onclick="clearAll()">🗑 清除</button>
    <button class="submit-btn" id="submitBtn" onclick="submitWork()">批閱 ✔</button>
  </div>

  <script>
    const API = window.location.origin;
    const params = new URLSearchParams(window.location.search);
    const assignmentId = parseInt(params.get('id'));
    const studentName = params.get('name') || '學生';

    // Drawing state
    let tool = 'pen';       // 'pen' | 'eraser'
    let color = '#111';
    let strokeSize = 2;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let history = [];       // Array of ImageData snapshots for undo
    let bgImage = null;     // HTMLImageElement of workbook page
    let assignment = null;
    let audioElements = []; // [{el: Audio, name, btn}]
    let currentAudioIdx = -1;

    const bgCanvas = document.getElementById('bgCanvas');
    const drawCanvas = document.getElementById('drawCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    const drawCtx = drawCanvas.getContext('2d');

    // ──────────────────────────────────────────────
    // Init
    // ──────────────────────────────────────────────
    async function init() {
      document.getElementById('topStudent').textContent = '👤 ' + studentName;
      try {
        const res = await fetch(`${API}/api/assignments/${assignmentId}`);
        if (!res.ok) {
          let msg = '找不到習作 (id=' + assignmentId + ')';
          try {
            const err = await res.json();
            if (err?.error) msg = err.error;
          } catch (_) {}
          throw new Error(msg);
        }
        assignment = await res.json();
        const unitLabel = assignment.unit === 9 ? 'Review 1' : assignment.unit === 10 ? 'Review 2' : `Unit ${assignment.unit}`;
        document.getElementById('topInfo').textContent =
          `Howdy ${assignment.howdy_level}  ${unitLabel}  ${assignment.book_type} 本`;
        if (assignment.grading_status === 'review_required') {
          document.getElementById('riskBannerText').textContent =
            assignment.risk_summary || '這份作業含高風險題型，分數需要老師人工覆核後才算正式。';
          document.getElementById('riskBanner').classList.remove('hidden');
        }

        // Load workbook background image
        await loadBackground(assignment.assignment_image);

        // Load audio files
        if (assignment.audio_files && assignment.audio_files.length > 0) {
          setupAudio(assignment.audio_files);
        }

        document.getElementById('loadingOverlay').classList.add('hidden');
      } catch(err) {
        document.getElementById('loadingTitle').textContent = '載入失敗';
        document.getElementById('loadingSub').textContent = err.message;
      }
    }

    function loadBackground(base64) {
      return new Promise((resolve, reject) => {
        bgImage = new Image();
        bgImage.onload = () => {
          // Scale to fit wrapper width (iPad screen width) while keeping aspect ratio
          const maxW = canvasWrapper.clientWidth || window.innerWidth;
          const scale = Math.min(1, maxW / bgImage.width);
          const W = Math.round(bgImage.width * scale);
          const H = Math.round(bgImage.height * scale);

          bgCanvas.width = W; bgCanvas.height = H;
          drawCanvas.width = W; drawCanvas.height = H;
          document.getElementById('canvasContainer').style.width = W + 'px';
          document.getElementById('canvasContainer').style.height = H + 'px';

          bgCtx.drawImage(bgImage, 0, 0, W, H);
          saveHistory();
          resolve();
        };
        bgImage.onerror = reject;
        bgImage.src = 'data:image/jpeg;base64,' + base64;
      });
    }

    // ──────────────────────────────────────────────
    // Audio
    // ──────────────────────────────────────────────
    function setupAudio(audioFiles) {
      const bar = document.getElementById('audioBar');
      const btnsContainer = document.getElementById('audioButtons');
      bar.classList.remove('hidden');
      btnsContainer.innerHTML = '';
      audioElements = [];

      audioFiles.forEach((af, idx) => {
        const audio = new Audio();
        // audio_files stored as [{name, data (base64 mp3), label}]
        audio.src = `data:audio/mp3;base64,${af.data}`;

        const btn = document.createElement('button');
        btn.className = 'audio-play-btn';
        btn.innerHTML = `▶ ${af.label || af.name || ('Track ' + (idx+1))}`;
        const prog = document.createElement('span');
        prog.className = 'audio-progress';
        prog.textContent = '';

        audio.addEventListener('timeupdate', () => {
          const t = Math.floor(audio.currentTime);
          const d = Math.floor(audio.duration) || 0;
          prog.textContent = d ? `${t}/${d}s` : '';
        });
        audio.addEventListener('ended', () => {
          btn.classList.remove('playing');
          btn.innerHTML = `▶ ${af.label || af.name || ('Track ' + (idx+1))}`;
        });

        btn.onclick = () => toggleAudio(idx);
        const track = document.createElement('div');
        track.className = 'audio-track';
        track.appendChild(btn);
        track.appendChild(prog);
        btnsContainer.appendChild(track);

        audioElements.push({ audio, btn, prog });
      });
    }

    function toggleAudio(idx) {
      const { audio, btn } = audioElements[idx];
      // Stop others
      audioElements.forEach((ae, i) => {
        if (i !== idx) { ae.audio.pause(); ae.btn.classList.remove('playing'); }
      });
      if (audio.paused) {
        audio.play();
        btn.classList.add('playing');
        btn.innerHTML = `⏸ ${btn.textContent.replace(/^[▶⏸]\s/, '')}`;
      } else {
        audio.pause();
        btn.classList.remove('playing');
        btn.innerHTML = `▶ ${btn.textContent.replace(/^[▶⏸]\s/, '')}`;
      }
    }

    // ──────────────────────────────────────────────
    // Drawing tools
    // ──────────────────────────────────────────────
    function setTool(t) {
      tool = t;
      document.getElementById('btnPen').classList.toggle('active', t === 'pen');
      document.getElementById('btnEraser').classList.toggle('active', t === 'eraser');
      drawCanvas.style.cursor = t === 'eraser' ? 'cell' : 'crosshair';
    }

    function setColor(c) {
      color = c; tool = 'pen'; setTool('pen');
      document.querySelectorAll('.color-dot').forEach(d =>
        d.classList.toggle('active', d.dataset.color === c));
    }

    function setStrokeSize(s) {
      strokeSize = s;
      document.querySelectorAll('.stroke-btn').forEach(b =>
        b.classList.toggle('active', parseInt(b.dataset.size) === s));
    }

    // ── Pointer 事件策略 ──────────────────────────────────────────
    // touch-action: none → 瀏覽器完全不介入，由 JS 負責一切
    //
    // Apple Pencil / 滑鼠 (pointerType === 'pen' | 'mouse') → 書寫
    // 手指 (pointerType === 'touch')
    //   單指 → 手動計算 scrollTop（捲動）
    //   雙指 → 手動 pinch zoom（縮放）
    //
    // activePointers: 追蹤所有按下的指標，以 id 為 key

    const activePointers = new Map(); // id → { type, clientX, clientY }
    let touchScroll = null;  // { id, startY, startScrollTop }
    let pinchState  = null;  // { id1, id2, startDist, startScale, startScrollTop, startScrollLeft }
    let viewScale   = 1;     // 目前縮放倍率（pinch zoom 用）
    const canvasWrapper = document.getElementById('canvasWrapper');

    function isPen(e) { return e.pointerType === 'pen' || e.pointerType === 'mouse'; }

    function getTouches() {
      return [...activePointers.values()].filter(p => p.type === 'touch');
    }

    function pointerXY(id) { return activePointers.get(id); }

    function pinchDist(a, b) {
      return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    // ─ pointerdown ─
    drawCanvas.addEventListener('pointerdown', (e) => {
      activePointers.set(e.pointerId, { type: e.pointerType, clientX: e.clientX, clientY: e.clientY });

      if (isPen(e)) {
        // 筆 → 書寫
        e.preventDefault();
        isDrawing = true;
        const pos = getPos(e);
        lastX = pos.x; lastY = pos.y;
        touchScroll = null; // 筆下時取消手指捲動
      } else if (e.pointerType === 'touch') {
        const touches = getTouches();
        if (touches.length === 1) {
          // 單指捲動
          touchScroll = { id: e.pointerId, startY: e.clientY, startScrollTop: canvasWrapper.scrollTop };
          pinchState = null;
        } else if (touches.length === 2) {
          // 雙指縮放：初始化 pinch
          touchScroll = null;
          const [a, b] = touches;
          const pA = activePointers.get(touches[0].id) || touches[0];
          const pB = activePointers.get(touches[1].id) || touches[1];
          // 用 Map 裡已記錄的兩個 touch 指標
          const ids = [...activePointers.entries()]
            .filter(([, v]) => v.type === 'touch').map(([k]) => k);
          if (ids.length === 2) {
            const p1 = activePointers.get(ids[0]);
            const p2 = activePointers.get(ids[1]);
            pinchState = {
              id1: ids[0], id2: ids[1],
              startDist: pinchDist(p1, p2),
              startScale: viewScale,
              startScrollTop: canvasWrapper.scrollTop
            };
          }
        }
      }
    });

    // ─ pointermove ─
    drawCanvas.addEventListener('pointermove', (e) => {
      // 更新位置記錄
      const prev = activePointers.get(e.pointerId);
      if (prev) activePointers.set(e.pointerId, { ...prev, clientX: e.clientX, clientY: e.clientY });

      if (isPen(e)) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        const pressure = (e.pressure > 0 && e.pointerType === 'pen') ? e.pressure : 0.5;
        drawCtx.lineJoin = 'round';
        drawCtx.lineCap  = 'round';

        if (tool === 'eraser') {
          const sz = strokeSize * 8;
          drawCtx.clearRect(pos.x - sz/2, pos.y - sz/2, sz, sz);
        } else {
          drawCtx.globalCompositeOperation = 'source-over';
          drawCtx.strokeStyle = color;
          drawCtx.lineWidth = Math.max(0.5, strokeSize * pressure * 1.5);
          drawCtx.beginPath();
          drawCtx.moveTo(lastX, lastY);
          drawCtx.lineTo(pos.x, pos.y);
          drawCtx.stroke();
        }
        lastX = pos.x; lastY = pos.y;

      } else if (e.pointerType === 'touch') {
        if (pinchState && (e.pointerId === pinchState.id1 || e.pointerId === pinchState.id2)) {
          // 雙指縮放
          const p1 = activePointers.get(pinchState.id1);
          const p2 = activePointers.get(pinchState.id2);
          if (p1 && p2) {
            const dist = pinchDist(p1, p2);
            const ratio = dist / pinchState.startDist;
            const newScale = Math.min(4, Math.max(0.5, pinchState.startScale * ratio));
            if (newScale !== viewScale) {
              viewScale = newScale;
              const container = document.getElementById('canvasContainer');
              container.style.transform = `scale(${viewScale})`;
              container.style.transformOrigin = 'top left';
            }
          }
        } else if (touchScroll && e.pointerId === touchScroll.id) {
          // 單指捲動
          const dy = touchScroll.startY - e.clientY;
          canvasWrapper.scrollTop = touchScroll.startScrollTop + dy;
        }
      }
    });

    // ─ pointerup / cancel / leave ─
    function endPointer(e) {
      activePointers.delete(e.pointerId);
      if (isPen(e)) {
        if (isDrawing) { isDrawing = false; saveHistory(); }
      } else if (e.pointerType === 'touch') {
        if (touchScroll && touchScroll.id === e.pointerId) touchScroll = null;
        if (pinchState && (e.pointerId === pinchState.id1 || e.pointerId === pinchState.id2)) pinchState = null;
      }
    }
    drawCanvas.addEventListener('pointerup',     endPointer);
    drawCanvas.addEventListener('pointercancel', endPointer);
    drawCanvas.addEventListener('pointerleave',  (e) => { if (isPen(e)) endPointer(e); });

    function getPos(e) {
      const rect = drawCanvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (drawCanvas.width / rect.width),
        y: (e.clientY - rect.top)  * (drawCanvas.height / rect.height)
      };
    }

    // ──────────────────────────────────────────────
    // History (undo)
    // ──────────────────────────────────────────────
    function saveHistory() {
      if (history.length > 40) history.shift(); // keep last 40 states
      history.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
    }

    function undo() {
      if (history.length <= 1) { showErr('已經是最初狀態'); return; }
      history.pop();
      drawCtx.putImageData(history[history.length - 1], 0, 0);
    }

    function clearAll() {
      if (!confirm('確定清除所有書寫內容？')) return;
      drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      history = [];
      saveHistory();
    }

    // ──────────────────────────────────────────────
    // Submit & Grade
    // ──────────────────────────────────────────────
    async function submitWork() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;

      // Merge background + drawing into single JPEG
      const mergeCanvas = document.createElement('canvas');
      mergeCanvas.width  = bgCanvas.width;
      mergeCanvas.height = bgCanvas.height;
      const mCtx = mergeCanvas.getContext('2d');
      mCtx.drawImage(bgCanvas, 0, 0);
      mCtx.drawImage(drawCanvas, 0, 0);
      const jpegBase64 = mergeCanvas.toDataURL('image/jpeg', 0.88).split(',')[1];

      // Show loading
      document.getElementById('loadingTitle').textContent = '批改中…';
      document.getElementById('loadingSub').textContent = '請稍候，Claude AI 正在批改你的作業';
      document.getElementById('loadingOverlay').classList.remove('hidden');

      try {
        const result = await (await fetch(`${API}/api/submissions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assignment_id: assignmentId,
            student_name: studentName,
            submission_image: jpegBase64
          })
        })).json();

        if (result.error) throw new Error(result.error);
        document.getElementById('loadingOverlay').classList.add('hidden');
        showResults(result);
      } catch(err) {
        document.getElementById('loadingOverlay').classList.add('hidden');
        showErr('批改失敗：' + err.message);
        btn.disabled = false;
      }
    }

    // ──────────────────────────────────────────────
    // Results
    // ──────────────────────────────────────────────
    function showResults(result) {
      const provisional = result.score_status === 'provisional';
      const pct = result.percentage;
      const pctColor = provisional ? '#b06000' : (pct >= 80 ? '#28a745' : pct >= 60 ? '#fd7e14' : '#dc3545');

      document.getElementById('scoreBig').textContent = `${result.total_score} / ${result.total_possible}`;
      document.getElementById('scoreLabel').textContent = provisional
        ? `暫定分數 / 需老師覆核  ·  ${studentName}`
        : `得分 / 總分  ·  ${studentName}`;
      const pctEl = document.getElementById('scorePct');
      pctEl.textContent = provisional ? `${pct}%（暫定）` : pct + '%';
      pctEl.style.color = pctColor;
      const warning = document.getElementById('resultWarning');
      if (provisional) {
        warning.textContent = result.review_summary || '這份作業含高風險題型，這次批改結果只能當參考，老師覆核後才算正式成績。';
        warning.classList.remove('hidden');
      } else {
        warning.textContent = '';
        warning.classList.add('hidden');
      }

      // Per-question breakdown
      const list = document.getElementById('answerList');
      list.innerHTML = (result.answers || []).map(a => {
        const correct = a.correct_answer || '';
        const label = a.section ? `${a.section}-${a.question_number}` : `#${a.question_number}`;
        return `
          <div class="answer-row">
            <span class="q-num">${escHtml(label)}</span>
            <span class="${a.correct ? 'mark-ok' : 'mark-no'}">${a.correct ? '○' : '✕'}</span>
            <span class="ans-text">${escHtml(a.detected_text || '(空白)')}</span>
            ${!a.correct ? `<span class="ans-expected">→ ${escHtml(correct)}</span>` : ''}
          </div>`;
      }).join('');

      document.getElementById('resultsOverlay').classList.remove('hidden');
    }

    function goBack() {
      window.location.href = 'index.html';
    }

    function redoAssignment() {
      document.getElementById('resultsOverlay').classList.add('hidden');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('resultWarning').classList.add('hidden');
      // Clear drawing
      drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      history = [];
      saveHistory();
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function showErr(msg) {
      const t = document.getElementById('errToast');
      t.textContent = msg;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3500);
    }

    init();
  </script>
</body>
