<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教師管理 — Howdy English</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* ── Selector row ── */
    .sel-row { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.75rem; }
    .sel-row label { margin: 0; white-space: nowrap; }
    .sel-row select { width: auto; margin: 0; }

    /* ── Upload grid ── */
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .upload-grid { grid-template-columns: 1fr; } }

    .upload-box {
      border: 2px dashed #ddd; border-radius: 12px; padding: 1rem;
      text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
      background: #fafafa;
    }
    .upload-box:hover { border-color: #1a73e8; background: #f0f6ff; }
    .upload-box.has-file { border-color: #28a745; background: #f0fff4; }
    .upload-box input[type="file"] { display: none; }
    .upload-box .icon { font-size: 1.8rem; margin-bottom: 0.3rem; }
    .upload-box .title { font-weight: 700; font-size: 0.9rem; }
    .upload-box .hint  { font-size: 0.78rem; color: #888; margin-top: 0.2rem; }
    .upload-box .fname { font-size: 0.78rem; color: #28a745; margin-top: 0.3rem; word-break: break-all; }

    /* Preview */
    .preview-img { max-width: 100%; max-height: 180px; border-radius: 8px; margin-top: 0.5rem; border: 1px solid #eee; }

    /* Audio list */
    .audio-list { margin-top: 0.5rem; }
    .audio-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.6rem; background: #f8f9fa; border-radius: 6px; margin-bottom: 0.35rem;
    }
    .audio-item .aname { flex: 1; font-size: 0.85rem; }
    .audio-item input[type="text"] { width: 120px; margin: 0; font-size: 0.82rem; padding: 0.25rem 0.5rem; }
    .audio-item .del-a { background: none; border: none; color: #dc3545; font-size: 1rem; cursor: pointer; padding: 0 0.2rem; }

    /* Assignment table */
    .asg-table { width: 100%; border-collapse: collapse; }
    .asg-table th, .asg-table td { padding: 0.45rem 0.6rem; border-bottom: 1px solid #eee; font-size: 0.88rem; text-align: left; }
    .asg-table th { background: #f8f9fa; font-weight: 600; color: #555; }
    .asg-table tr:hover td { background: #fafafa; }
    .book-badge {
      display: inline-block; padding: 0.1rem 0.5rem; border-radius: 4px; font-weight: 700; font-size: 0.78rem;
      background: #e8f0fe; color: #1a73e8;
    }
    .audio-badge {
      display: inline-block; background: #fff3cd; color: #856404; border-radius: 4px;
      padding: 0.1rem 0.4rem; font-size: 0.75rem;
    }

    /* Tabs */
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab-btn {
      padding: 0.4rem 1.1rem; border-radius: 20px; border: 1.5px solid #ddd;
      background: white; color: #555; font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Nav extra */
    .nav-home { font-size: 0.82rem; color: rgba(255,255,255,0.75); text-decoration: none; }
    .nav-home:hover { color: white; }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>教師管理</h1>
    <nav>
      <a href="index.html" class="nav-home">← 學生首頁</a>
    </nav>
  </header>

  <div class="container">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('upload')">📤 上傳教材</button>
      <button class="tab-btn" onclick="switchTab('list')">📋 習作清單</button>
    </div>

    <!-- ═══ TAB: Upload ═══ -->
    <div class="tab-content active" id="tabUpload">
      <div class="card">
        <h2>新增 / 更新習作</h2>

        <!-- Step A: Select -->
        <div class="sel-row">
          <label>Howdy</label>
          <select id="selHowdy">
            <option value="">-- 選冊 --</option>
            <script>for(let i=1;i<=10;i++) document.write(`<option value="${i}">${i}</option>`);</script>
          </select>
          <label>Unit</label>
          <select id="selUnit">
            <option value="">-- 選 Unit --</option>
            <script>for(let i=1;i<=8;i++) document.write(`<option value="${i}">${i}</option>`);</script>
          </select>
          <label>習作本</label>
          <select id="selBook">
            <option value="">-- 選本 --</option>
            <option value="A">A 本</option>
            <option value="B">B 本</option>
            <option value="C">C 本</option>
          </select>
        </div>

        <!-- Step B: Images -->
        <div class="upload-grid">
          <!-- Blank workbook page -->
          <div>
            <label style="margin-bottom:0.4rem; font-weight:700;">📄 空白習作頁 <span style="color:#dc3545;">*</span></label>
            <div class="upload-box" id="boxAssign" onclick="document.getElementById('fileAssign').click()">
              <div class="icon">🖼️</div>
              <div class="title">點擊上傳空白習作（1–3 頁）</div>
              <div class="hint">可同時選取多張，依序垂直拼接 · JPG / PNG / PDF</div>
              <div class="fname hidden" id="nameAssign"></div>
              <input type="file" id="fileAssign" accept="image/*,.pdf" multiple>
            </div>
            <img class="preview-img hidden" id="previewAssign" alt="">
          </div>

          <!-- Answer key -->
          <div>
            <label style="margin-bottom:0.4rem; font-weight:700;">✅ 答案卷 <span style="color:#dc3545;">*</span></label>
            <div class="upload-box" id="boxAnswer" onclick="document.getElementById('fileAnswer').click()">
              <div class="icon">📋</div>
              <div class="title">點擊上傳答案卷（1–3 頁）</div>
              <div class="hint">可同時選取多張，依序垂直拼接 · JPG / PNG / PDF</div>
              <div class="fname hidden" id="nameAnswer"></div>
              <input type="file" id="fileAnswer" accept="image/*,.pdf" multiple>
            </div>
            <img class="preview-img hidden" id="previewAnswer" alt="">
          </div>
        </div>

        <!-- Step C: Audio -->
        <div style="margin-top:1rem;">
          <label style="font-weight:700; margin-bottom:0.4rem; display:block;">🎧 聽力音檔（選填）</label>
          <div class="upload-box" id="boxAudio" onclick="document.getElementById('fileAudio').click()">
            <div class="icon">🎵</div>
            <div class="title">點擊新增音檔（可多個）</div>
            <div class="hint">MP3 格式</div>
            <input type="file" id="fileAudio" accept="audio/mp3,audio/mpeg,.mp3" multiple>
          </div>
          <div class="audio-list" id="audioList"></div>
        </div>

        <!-- Save -->
        <div style="margin-top:1.25rem;">
          <button class="btn btn-success btn-lg" id="saveBtn" onclick="saveAssignment()">💾 儲存習作</button>
        </div>
      </div>
    </div>

    <!-- ═══ TAB: List ═══ -->
    <div class="tab-content" id="tabList">
      <div class="card">
        <div class="flex-between mb-2">
          <h2 style="margin:0;">已上傳的習作</h2>
          <button class="btn btn-sm btn-outline" onclick="loadAssignments()">🔄 重新整理</button>
        </div>
        <div id="assignmentListWrap">
          <p style="color:#aaa;">載入中…</p>
        </div>
      </div>
    </div>

  </div><!-- /container -->

  <!-- PDF.js CDN for PDF → image conversion -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <script src="js/common.js"></script>
  <script>
    const API = window.location.origin;

    // Storage for current upload
    let assignBase64 = null;   // blank workbook page JPEG base64
    let answerBase64 = null;   // answer key JPEG base64
    let audioFiles   = [];     // [{name, label, data (base64 mp3)}]

    // ── Tabs ──
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) =>
        b.classList.toggle('active', (i === 0 ? 'upload' : 'list') === tab));
      document.getElementById('tabUpload').classList.toggle('active', tab === 'upload');
      document.getElementById('tabList').classList.toggle('active', tab === 'list');
      if (tab === 'list') loadAssignments();
    }

    // ── Image upload helpers ──

    // Convert a single File to JPEG base64
    async function fileToJpegB64(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext === 'pdf') {
        return await pdfPageToJpeg(file);   // already stitches all PDF pages
      } else if (ext === 'heic' || file.type === 'image/heic') {
        const raw = await fileToBase64(file);
        const res = await apiCall('/api/convert-heic', { method: 'POST', body: { image: raw } });
        return res.image;
      } else {
        return await imgFileToJpeg(file);
      }
    }

    // Stitch multiple JPEG base64 strings vertically into one
    async function stitchImages(b64List) {
      if (b64List.length === 1) return b64List[0];
      const imgs = await Promise.all(b64List.map(b64 => new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => res(img);
        img.onerror = rej;
        img.src = 'data:image/jpeg;base64,' + b64;
      })));
      const maxW = Math.max(...imgs.map(i => i.naturalWidth));
      const totalH = imgs.reduce((s, i) => s + i.naturalHeight, 0);
      const c = document.createElement('canvas');
      c.width = maxW; c.height = totalH;
      const ctx = c.getContext('2d');
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, maxW, totalH);
      let y = 0;
      for (const img of imgs) { ctx.drawImage(img, 0, y); y += img.naturalHeight; }
      return c.toDataURL('image/jpeg', 0.92).split(',')[1];
    }

    // Handle 1–3 files: convert each, stitch, then update UI
    async function handleMultiImageFiles(files, previewEl, nameEl, boxEl, onDone) {
      const fileArr = Array.from(files).slice(0, 3);
      if (fileArr.length === 0) return;
      showToast(`處理 ${fileArr.length} 頁圖片中…`);
      try {
        const b64List = [];
        for (const file of fileArr) {
          b64List.push(await fileToJpegB64(file));
        }
        const stitched = await stitchImages(b64List);
        const names = fileArr.map(f => f.name).join('、');
        nameEl.textContent = fileArr.length > 1
          ? `✅ ${fileArr.length} 頁已拼接：${names}`
          : `✅ ${names}`;
        nameEl.classList.remove('hidden');
        previewEl.src = 'data:image/jpeg;base64,' + stitched;
        previewEl.classList.remove('hidden');
        boxEl.classList.add('has-file');
        onDone(stitched);
        showToast(fileArr.length > 1 ? `✅ ${fileArr.length} 頁已垂直拼接` : '✅ 圖片已載入');
      } catch(err) {
        showToast('圖片載入失敗：' + err.message, 'error');
      }
    }

    document.getElementById('fileAssign').addEventListener('change', e => {
      if (!e.target.files.length) return;
      handleMultiImageFiles(e.target.files,
        document.getElementById('previewAssign'),
        document.getElementById('nameAssign'),
        document.getElementById('boxAssign'),
        b64 => assignBase64 = b64
      );
      e.target.value = '';
    });

    document.getElementById('fileAnswer').addEventListener('change', e => {
      if (!e.target.files.length) return;
      handleMultiImageFiles(e.target.files,
        document.getElementById('previewAnswer'),
        document.getElementById('nameAnswer'),
        document.getElementById('boxAnswer'),
        b64 => answerBase64 = b64
      );
      e.target.value = '';
    });

    // ── Audio upload ──
    document.getElementById('fileAudio').addEventListener('change', async e => {
      for (const file of e.target.files) {
        showToast(`載入音檔：${file.name}…`);
        try {
          const data = await fileToBase64(file);
          const name = file.name.replace(/\.[^.]+$/, '');
          audioFiles.push({ name, label: name, data });
          renderAudioList();
          showToast('✅ ' + file.name + ' 已加入');
        } catch(err) {
          showToast('音檔載入失敗：' + err.message, 'error');
        }
      }
      e.target.value = '';
    });

    function renderAudioList() {
      const list = document.getElementById('audioList');
      if (audioFiles.length === 0) { list.innerHTML = ''; return; }
      list.innerHTML = audioFiles.map((af, i) => `
        <div class="audio-item">
          <span class="aname">🎵 ${escHtml(af.name)}</span>
          <input type="text" value="${escHtml(af.label)}" placeholder="顯示名稱"
                 onchange="audioFiles[${i}].label = this.value">
          <button class="del-a" onclick="removeAudio(${i})">✕</button>
        </div>`).join('');
    }

    function removeAudio(i) {
      audioFiles.splice(i, 1);
      renderAudioList();
    }

    // ── Save ──
    async function saveAssignment() {
      const howdy = parseInt(document.getElementById('selHowdy').value);
      const unit  = parseInt(document.getElementById('selUnit').value);
      const book  = document.getElementById('selBook').value;

      if (!howdy || !unit || !book) { showToast('請先選擇冊、Unit 和習作本', 'error'); return; }
      if (!assignBase64) { showToast('請上傳空白習作頁圖片', 'error'); return; }
      if (!answerBase64) { showToast('請上傳答案卷圖片', 'error'); return; }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = '儲存中…';

      try {
        await apiCall('/api/assignments', {
          method: 'POST',
          body: {
            howdy_level: howdy, unit, book_type: book,
            assignment_image: assignBase64,
            answer_key_image: answerBase64,
            audio_files: audioFiles
          }
        });
        showToast(`✅ Howdy ${howdy} Unit ${unit} ${book}本 已儲存！`);
        // Reset
        assignBase64 = null; answerBase64 = null; audioFiles = [];
        ['previewAssign','previewAnswer'].forEach(id => {
          const el = document.getElementById(id);
          el.src = ''; el.classList.add('hidden');
        });
        ['nameAssign','nameAnswer'].forEach(id =>
          document.getElementById(id).classList.add('hidden'));
        ['boxAssign','boxAnswer'].forEach(id =>
          document.getElementById(id).classList.remove('has-file'));
        renderAudioList();
        document.getElementById('selHowdy').value = '';
        document.getElementById('selUnit').value = '';
        document.getElementById('selBook').value = '';
      } catch(err) {
        showToast('儲存失敗：' + err.message, 'error');
      } finally {
        btn.disabled = false; btn.textContent = '💾 儲存習作';
      }
    }

    // ── Assignment list ──
    async function loadAssignments() {
      const wrap = document.getElementById('assignmentListWrap');
      wrap.innerHTML = '<p style="color:#aaa;">載入中…</p>';
      try {
        const list = await apiCall('/api/assignments');
        if (list.length === 0) {
          wrap.innerHTML = '<p style="color:#aaa;">尚未上傳任何習作。</p>'; return;
        }
        wrap.innerHTML = `
          <table class="asg-table">
            <thead>
              <tr><th>Howdy</th><th>Unit</th><th>習作本</th><th>音檔</th><th>上傳時間</th><th></th></tr>
            </thead>
            <tbody>
              ${list.map(a => `
                <tr>
                  <td>Howdy ${a.howdy_level}</td>
                  <td>Unit ${a.unit}</td>
                  <td><span class="book-badge">${a.book_type} 本</span></td>
                  <td>${parseInt(a.audio_count) > 0
                        ? `<span class="audio-badge">🎵 ${a.audio_count} 個</span>`
                        : '<span style="color:#ccc;">—</span>'}</td>
                  <td>${new Date(a.created_at).toLocaleDateString('zh-TW')}</td>
                  <td>
                    <button class="btn btn-sm btn-danger" onclick="deleteAssignment(${a.id}, ${a.howdy_level}, ${a.unit}, '${a.book_type}')">刪除</button>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      } catch(err) {
        wrap.innerHTML = `<p style="color:#dc3545;">載入失敗：${err.message}</p>`;
      }
    }

    async function deleteAssignment(id, h, u, bk) {
      if (!confirm(`確定刪除 Howdy ${h} Unit ${u} ${bk}本？`)) return;
      try {
        await apiCall(`/api/assignments/${id}`, { method: 'DELETE' });
        showToast('已刪除');
        loadAssignments();
      } catch(err) {
        showToast('刪除失敗：' + err.message, 'error');
      }
    }

    // ── Image helpers ──
    function imgFileToJpeg(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const maxDim = 2800;
            let w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              const s = maxDim / Math.max(w, h);
              w = Math.round(w * s); h = Math.round(h * s);
            }
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(c.toDataURL('image/jpeg', 0.9).split(',')[1]);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // 將 PDF 所有頁面渲染後垂直拼接成一張 JPEG
    async function pdfPageToJpeg(file) {
      if (typeof pdfjsLib === 'undefined') throw new Error('PDF.js 未載入');
      const ab = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
      const numPages = pdf.numPages;

      // 渲染每一頁
      const pages = [];
      let totalH = 0, maxW = 0;
      for (let i = 1; i <= numPages; i++) {
        const page = await pdf.getPage(i);
        const vp = page.getViewport({ scale: 2.5 });
        const c = document.createElement('canvas');
        c.width = vp.width; c.height = vp.height;
        await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
        pages.push(c);
        totalH += vp.height;
        maxW = Math.max(maxW, vp.width);
      }

      // 垂直拼接所有頁面
      const combined = document.createElement('canvas');
      combined.width = maxW;
      combined.height = totalH;
      const ctx = combined.getContext('2d');
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, maxW, totalH);
      let y = 0;
      for (const pc of pages) {
        ctx.drawImage(pc, 0, y);
        y += pc.height;
      }
      return combined.toDataURL('image/jpeg', 0.92).split(',')[1];
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || ''; return d.innerHTML;
    }

    // Init
    loadAssignments();
  </script>
</body>
</html>
