<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Homework Grader</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <header class="app-header">
    <h1>English Homework Grader</h1>
    <nav>
      <a href="teacher.html">Answer Keys</a>
      <a href="grader.html">Grade</a>
    </nav>
  </header>

  <div class="container" style="margin-top: 2rem;">
    <div class="card text-center" style="max-width: 500px; margin: 0 auto;">
      <h2>Welcome / Enter Your Name</h2>
      <p style="color: #666; margin-bottom: 1rem; font-size: 0.9rem;">Your name is used to save and load your answer keys.</p>
      <input type="text" id="teacherName" placeholder="Enter your name" style="text-align: center; font-size: 1.1rem;">
      <div class="flex-center gap-1 mt-2">
        <button class="btn btn-primary" onclick="goToTeacher()">Create Answer Key</button>
        <button class="btn btn-outline" onclick="goToGrader()">Start Grading</button>
      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    const nameInput = document.getElementById('teacherName');
    nameInput.value = getTeacherName();

    function saveName() {
      const name = nameInput.value.trim();
      if (!name) {
        showToast('Please enter your name', 'error');
        nameInput.focus();
        return false;
      }
      setTeacherName(name);
      return true;
    }

    function goToTeacher() { if (saveName()) window.location.href = 'teacher.html'; }
    function goToGrader() { if (saveName()) window.location.href = 'grader.html'; }

    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') goToTeacher();
    });
  </script>
</body>
</html>
